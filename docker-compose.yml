services:
  clickhouse:
    image: clickhouse/clickhouse-server:24.8
    container_name: rag_clickhouse
    ports:
      - "8123:8123"   # HTTP interface (used by clickhouse-connect)
      - "9000:9000"   # native protocol
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    volumes:
      # Read-only user profile with row/time limits.
      - ./clickhouse/users.xml:/etc/clickhouse-server/users.d/assistant.xml:ro
      # DDL + synthetic seed data, applied once on first start.
      - ./clickhouse/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8123/ping"]
      interval: 5s
      timeout: 3s
      retries: 10
